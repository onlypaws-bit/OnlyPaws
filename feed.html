<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OnlyPaws — Feed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Global styles -->
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body class="feedPage">
  <!-- Shared header -->
  <div id="site-header"></div>

  <main class="wrap feedWrap">
    <section class="panel">
      <h1>Feed</h1>
      <p class="sub">Browse creators, discover cute content, and support what you love.</p>

      <div class="searchRow">
        <input id="searchInput" class="search" placeholder="Search creators (by name or @username)..." />
      </div>

      <div class="subtleLine" id="supportUsMount"></div>
      <div id="debug" class="debug"></div>
    </section>

    <section class="panel" style="margin-top:14px;">
      <div class="pill">Featured creators</div>
      <div class="creatorList" id="creatorList"></div>
      <div class="hint" id="creatorHint">Loading creators…</div>
    </section>

    <section class="panel" style="margin-top:14px;">
      <div class="postsHeader">
        <h2>Latest posts</h2>
        <div class="hint" style="margin-top:0;">Visible posts (premium appears after purchase)</div>
      </div>
      <div class="posts" id="posts"></div>
      <div class="hint" id="postsHint">Loading posts…</div>
    </section>
  </main>

  <!-- Shared footer -->
  <div id="site-footer"></div>

  <!-- Shared / app scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/partials.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/support-us.js"></script>
  <script src="supabase.js"></script>
  <script src="supabase.likes.js"></script>
  <script src="post-card.js"></script>

  <script>
    let creatorsAll = [];

    function goIndex(){ window.location.replace("index.html"); }

    function show(el, yes){
      if(!el) return;
      el.style.display = yes ? "inline-flex" : "none";
    }

    function setDebug(msg){
      const el = document.getElementById("debug");
      if(!el) return;
      if(!msg){
        el.style.display = "none";
        el.textContent = "";
        return;
      }
      el.style.display = "block";
      el.textContent = msg;
    }

    function esc(s){
      return (s ?? "").toString()
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function creatorProfileUrl(username){
      return `creator-profile.html?u=${encodeURIComponent(username)}`;
    }

    function postUrl(postId){
      return `post.html?id=${encodeURIComponent(postId)}`;
    }

    function avatarHtml(c){
      const url = (c?.avatar_url || "").trim();
      if(url){
        return `<img src="${esc(url)}" alt="Avatar" loading="lazy" decoding="async" referrerpolicy="no-referrer">`;
      }
      return "🐾";
    }

    function renderCreators(list){
      const el = document.getElementById("creatorList");
      if(!list || list.length === 0){
        el.innerHTML = "";
        return;
      }
      el.innerHTML = list.map(c => {
        const name = c.display_name || c.username || "Creator";
        const uname = c.username || "username";
        const bio = c.bio || "";
        return `
          <a class="creatorLink" href="${creatorProfileUrl(uname)}" aria-label="Open ${esc(name)} profile">
            <div class="creatorCard">
              <div class="avatar">${avatarHtml(c)}</div>
              <div>
                <b>${esc(name)}</b>
                <span>@${esc(uname)}${bio ? " • " + esc(bio).slice(0, 40) : ""}</span>
              </div>
            </div>
          </a>
        `;
      }).join("");
    }

    function mediaBlock(p){
      if(!p.media_url) return "";
      const isVideo = p.media_type === "video";
      const locked = p.is_locked === true;

      const media = isVideo
        ? `<video ${locked ? "" : "controls"} playsinline src="${esc(p.media_url)}"></video>`
        : `<img src="${esc(p.media_url)}" alt="Post media">`;

      if(!locked){
        return `<div class="mediaWrap">${media}</div>`;
      }

      const uname = p?.profiles?.username || "creator";
      const url = creatorProfileUrl(uname);

      return `
        <div class="mediaWrap blurred">
          ${media}
          <div class="lockOverlay">
            <div class="badge">🔒 Subscribers / Premium</div>
            <a class="navBtn primary" href="${url}">Open creator</a>
          </div>
        </div>
      `;
    }

    function wirePostCreatorPills(root){
      (root || document).querySelectorAll(".postCreatorPill").forEach(a => {
        const stop = (e) => { e.stopPropagation(); };
        a.addEventListener("click", stop);
        a.addEventListener("mousedown", stop);
        a.addEventListener("touchstart", stop, {passive:true});
      });
    }

    function renderPosts(list){
      const postsEl = document.getElementById("posts");
      if(!list || list.length === 0){
        postsEl.innerHTML = `
          <div class="postCard">
            <h3>No posts yet</h3>
            <p>Creators will appear here once they publish.</p>
          </div>
        `;
        return;
      }

      if(window.OnlyPawsPostCard?.renderPostCard){
        postsEl.innerHTML = list.map(p => {
          const uname = p?.profiles?.username || "creator";
          const locked = Boolean(p.is_locked);
          const premium = (p.is_paid === true);

          const cardHtml = window.OnlyPawsPostCard.renderPostCard({
            id: p.id,
            creator_username: uname,
            title: p.title || "Post",
            excerpt: locked ? (p.preview || "Locked content.") : (p.preview || p.content || ""),
            price_cents: p.price_cents ?? null,
            currency: p.currency || "eur",
            is_locked: locked,
            media_url: p.media_url || null,
            media_type: p.media_type || null,
          });

          const access = (!locked && premium) ? "unlocked" : (premium ? "premium" : "free");
          return `<div class="postItem"><div class="postCreatorRow"><a class="postCreatorPill" href="${creatorProfileUrl(uname)}">@${esc(uname)}</a></div><div class="postLinkWrap" tabindex="0" data-post-id="${esc(p.id)}" data-creator="${esc(uname)}" data-premium="${premium ? "1" : "0"}" data-locked="${locked ? "1" : "0"}" data-access="${access}">${cardHtml}</div></div>`;
        }).join("");

        window.OnlyPawsPostCard.initPostCards(postsEl);
        patchUnlockedBadges(postsEl);
        removeInnerUserIfPillExists(postsEl);
        wirePostCreatorPills(document);
        return;
      }

      postsEl.innerHTML = list.map(p => {
        const uname = p?.profiles?.username || "creator";
        const title = p.title || "Post";
        const content = (p.is_locked ? (p.preview || "Locked content.") : (p.content || p.preview || ""));
        const paidBadge = p.is_paid ? "🔒 PREMIUM" : "🆓 FREE";

        return `
          <div class="postCard">
            <div class="postTop">
              <a class="postCreatorPill" href="${creatorProfileUrl(uname)}" onclick="event.stopPropagation();">@${esc(uname)}</a>
              <div class="badge">${paidBadge}</div>
            </div>
            <h3>${esc(title)}</h3>
            ${mediaBlock(p)}
            <p>${esc(content)}</p>
          </div>
        `;
      }).join("");
    }

    function setupSearch(){
      const input = document.getElementById("searchInput");
      input.addEventListener("input", () => {
        const q = (input.value || "").trim().toLowerCase();
        if(!q){ renderCreators(creatorsAll); return; }
        renderCreators(creatorsAll.filter(c => {
          const name = (c.display_name || "").toLowerCase();
          const uname = (c.username || "").toLowerCase();
          return name.includes(q) || uname.includes(q);
        }));
      });
    }

    async function hydrateNavLoggedOnly(){
      const profileBtn = document.getElementById("navProfile");
      const logoutBtn  = document.getElementById("navLogout");
      const fanDash     = document.getElementById("navFanDash");
      const creatorDash = document.getElementById("navCreatorDash");

      show(profileBtn, true);
      show(logoutBtn, true);
      show(fanDash, false);
      show(creatorDash, false);

      try{
        const { data: u } = await onlypawsClient.auth.getUser();
        const userId = u?.user?.id;
        if(!userId) return;

        const { data: p } = await onlypawsClient
          .from("profiles")
          .select("role")
          .eq("user_id", userId)
          .maybeSingle();

        if(p?.role === "creator"){
          show(creatorDash, true);
        }else{
          show(fanDash, true);
        }
      }catch(e){}
    }

    function setupLogout(){
      const logoutBtn = document.getElementById("navLogout");
      if(!logoutBtn) return;
      if (logoutBtn.dataset.bound === "1") return;
      logoutBtn.dataset.bound = "1";

      logoutBtn.addEventListener("click", async (ev) => {
        ev.preventDefault();
        logoutBtn.disabled = true;
        logoutBtn.textContent = "Logging out…";
        try { await onlypawsClient.auth.signOut(); } catch(e) {}
        goIndex();
      });
    }

    async function loadCreators(currentUserId){
      const hint = document.getElementById("creatorHint");
      hint.textContent = "Loading creators…";

      const { data, error } = await onlypawsClient
        .from("profiles")
        .select("user_id, username, display_name, bio, role, avatar_url")
        .eq("role", "creator")
        .not("username", "is", null)
        .limit(50);

      if(error){
        hint.textContent = "Could not load creators.";
        setDebug(`Creators query failed:\n${error.message}\n(code: ${error.code || "?"})`);
        console.error(error);
        creatorsAll = [];
        renderCreators([]);
        return;
      }

      const filtered = (data || [])
        .filter(c => (c.user_id || "") !== (currentUserId || ""))
        .slice(0, 12);

      creatorsAll = filtered.map(c => ({
        user_id: c.user_id,
        username: c.username,
        display_name: c.display_name || c.username,
        bio: c.bio || "",
        avatar_url: c.avatar_url || ""
      }));

      renderCreators(creatorsAll);
      hint.textContent = creatorsAll.length ? "" : "No creators yet.";
    }

    async function loadLatestPosts(){
      const hint = document.getElementById("postsHint");
      hint.textContent = "Loading posts…";

      const { data: sess } = await onlypawsClient.auth.getSession();
      const session = sess?.session;
      const viewerId = session?.user?.id || null;

      const { data, error } = await onlypawsClient
        .from("posts")
        .select("id, creator_id, title, content, preview, media_url, media_type, is_paid, is_public, created_at, profiles(username, display_name, avatar_url)")
        .order("created_at", { ascending: false })
        .limit(12);

      if(error){
        hint.textContent = "Could not load posts.";
        setDebug((document.getElementById("debug").textContent ? document.getElementById("debug").textContent + "\n\n" : "") +
          `Posts query failed:\n${error.message}\n(code: ${error.code || "?"})`
        );
        console.error(error);
        renderPosts([]);
        return;
      }

      const posts = data || [];

      if(!viewerId){
        const enriched = posts.map(p => {
          const locked = (p.is_public === false) || (p.is_paid === true);
          return { ...p, can_view: !locked, is_locked: locked };
        });
        renderPosts(enriched);
        hint.textContent = enriched.length ? "" : "No posts yet.";
        return;
      }

      const creatorIdsToCheck = [...new Set(
        posts
          .filter(p =>
            p?.creator_id &&
            p.creator_id !== viewerId &&
            p.is_public !== false &&
            p.is_paid === true
          )
          .map(p => p.creator_id)
      )];

      const subMap = new Map();
      for(const cid of creatorIdsToCheck) subMap.set(cid, false);

      if(creatorIdsToCheck.length){
        const { data: subs, error: sErr } = await onlypawsClient
          .from("fan_subscriptions")
          .select("creator_id, status, current_period_end, cancel_at_period_end")
          .eq("fan_id", viewerId)
          .in("creator_id", creatorIdsToCheck);

        if(sErr){
          console.warn("fan_subscriptions lookup error", sErr);
        }else{
          const now = Date.now();

          for(const r of (subs || [])){
            const raw = r.current_period_end;

            let endMs = 0;
            if(raw){
              if(typeof raw === "number" || /^\d+$/.test(String(raw))){
                const n = Number(raw);
                endMs = (n < 1e12) ? (n * 1000) : n;
              }else{
                endMs = new Date(raw).getTime();
              }
            }

            let hasAccess = !!endMs && endMs > now;

            if(!hasAccess && !raw){
              const st = (r.status || "").toString().toLowerCase();
              if(st === "active" || st === "trialing") hasAccess = true;
            }

            if(hasAccess) subMap.set(r.creator_id, true);
          }
        }
      }

      const enriched = posts.map(p => {
        const isMine = (p.creator_id === viewerId);

        if(p.is_public === false){
          const locked = !isMine;
          return { ...p, can_view: !locked, is_locked: locked };
        }

        if(p.is_paid !== true){
          return { ...p, can_view: true, is_locked: false };
        }

        const isSub = (subMap.get(p.creator_id) === true);
        const locked = !(isMine || isSub);
        return { ...p, can_view: !locked, is_locked: locked };
      });

      renderPosts(enriched);
      hint.textContent = enriched.length ? "" : "No posts yet.";
    }

    function patchUnlockedBadges(root){
      try{
        const wraps = root.querySelectorAll('.postLinkWrap[data-access="unlocked"]');
        wraps.forEach(w => {
          const badges = w.querySelectorAll(".badge");
          if(!badges || !badges.length) return;
          const b = badges[badges.length - 1];
          const t = (b.textContent || "").trim().toUpperCase();
          if(t.includes("FREE") || t.includes("🆓")){
            b.textContent = "🔓 UNLOCKED";
          }
        });
      }catch(e){}
    }

    function removeInnerUserIfPillExists(root){
      try{
        const items = (root || document).querySelectorAll(".postItem");
        items.forEach(item => {
          const hasPill = item.querySelector(".postCreatorPill");
          if(!hasPill) return;

          const wrap = item.querySelector(".postLinkWrap");
          if(!wrap) return;

          wrap.querySelectorAll("*").forEach(el => {
            const txt = (el.textContent || "").trim();
            if(/^@[a-zA-Z0-9_.]+$/.test(txt)){
              el.remove();
            }
          });
        });
      }catch(e){}
    }

    function setupPostClickRouting(){
      const postsEl = document.getElementById("posts");
      if(!postsEl) return;

      function isCreatorClick(target){
        if(target.closest("img, video, .mediaWrap")) return false;

        const wrap = target.closest(".postLinkWrap");
        if(!wrap) return false;

        const handleEl =
          target.closest('[data-username],[data-handle],[data-creator-username],[data-creator],.badge,.username,.handle,.author,.creator,[role="link"]');

        const raw = (handleEl?.textContent || target.textContent || "").trim();
        const m = raw.match(/@([a-zA-Z0-9_\.]+)/);
        if(!m) return false;

        let uname =
          (handleEl?.getAttribute?.("data-username") || "") ||
          (handleEl?.getAttribute?.("data-handle") || "") ||
          (handleEl?.getAttribute?.("data-creator-username") || "") ||
          "";

        if(!uname) uname = wrap.getAttribute("data-creator") || "";
        if(!uname) uname = m[1];

        if(!uname) return false;

        window.location.href = creatorProfileUrl(uname);
        return true;
      }

      function goPost(wrap){
        const postId = wrap?.getAttribute("data-post-id") || "";
        if(postId){
          window.location.href = postUrl(postId);
          return;
        }
        const uname = wrap?.getAttribute("data-creator") || "";
        if(uname) window.location.href = creatorProfileUrl(uname);
      }

      postsEl.addEventListener("click", (e) => {
        const target = e.target;
        if(target.closest("a, button, input, textarea, select, label")) return;

        if(isCreatorClick(target)){
          e.preventDefault();
          return;
        }

        const wrap = target.closest(".postLinkWrap");
        if(!wrap) return;

        e.preventDefault();
        goPost(wrap);
      });

      postsEl.addEventListener("keydown", (e) => {
        if(e.key !== "Enter") return;
        const target = e.target;

        if(isCreatorClick(target)) return;

        const wrap = target.closest(".postLinkWrap");
        if(!wrap) return;

        e.preventDefault();
        goPost(wrap);
      });
    }

    async function boot(){
      if(window.loadSitePartials){
        await window.loadSitePartials();
      }

      if(window.mountSupportUs){
        window.mountSupportUs("supportUsMount");
      }else{
        const supportEl = document.getElementById("supportUsMount");
        if(supportEl){
          supportEl.innerHTML = 'Want to help keep OnlyPaws running? <a target="_blank" href="https://buy.stripe.com/4gM14ocjm5qec9w04n5wI05">Support OnlyPaws</a>';
        }
      }

      setupSearch();
      setupLogout();
      setupPostClickRouting();

      const { data, error } = await onlypawsClient.auth.getSession();
      if(error){
        setDebug(`Auth session error:\n${error.message}`);
      }
      const session = data?.session;

      if(!session){
        goIndex();
        return;
      }

      await hydrateNavLoggedOnly();
      await loadCreators(session.user.id);
      await loadLatestPosts();
    }

    onlypawsClient.auth.onAuthStateChange((event) => {
      if(event === "SIGNED_OUT") goIndex();
    });

    window.addEventListener("DOMContentLoaded", boot);
  </script>

  <div id="mediaModal" class="mediaModal" aria-hidden="true">
    <div class="mediaModalInner" role="dialog" aria-modal="true" aria-label="Media preview">
      <button id="mediaModalClose" class="mediaModalClose" type="button">✕</button>
      <img id="mediaModalImg" alt="Preview" style="display:none;">
      <video id="mediaModalVid" controls playsinline style="display:none;"></video>
    </div>
  </div>
</body>
</html>
