<script>
  (function () {
    const path = window.location.pathname.toLowerCase();
    let current = "index";

    if (path.endsWith("/")) current = "index";
    else if (path.includes("creators")) current = "creators";
    else if (path.includes("fans")) current = "fans";
    else if (path.includes("feed")) current = "feed";
    else if (path.includes("index")) current = "index";

    document.querySelectorAll("[data-page]").forEach(link => {
      if (link.dataset.page === current) {
        link.classList.add("activeNavLink");
      }
    });
  })();
</script>
