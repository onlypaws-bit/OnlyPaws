<div class="nav marketingNav">
  <a href="index.html" class="brand">
    <div class="brandLogo">
      <img src="assets/logo.png" alt="OnlyPaws logo">
    </div>
    <span style="font-size:1.1rem;">OnlyPaws</span>
  </a>

  <div class="navRight marketingLinks">
    <a class="ghost navLink" href="index.html" data-marketing-link="index">Home</a>
    <a class="ghost navLink" href="creators.html" data-marketing-link="creators">Creators</a>
    <a class="ghost navLink" href="fans.html" data-marketing-link="fans">Fans</a>
    <a class="ghost navLink" href="feed.html" data-marketing-link="feed">Feed</a>
  </div>
</div>

<script>
  (function () {
    const path = window.location.pathname.toLowerCase();
    let current = "index";

    if (path.includes("creators")) current = "creators";
    else if (path.includes("fans")) current = "fans";
    else if (path.includes("feed")) current = "feed";
    else if (path.includes("index")) current = "index";

    document.querySelectorAll("[data-marketing-link]").forEach(link => {
      if (link.dataset.marketingLink === current) {
        link.style.background = "rgba(255,255,255,.22)";
        link.style.border = "1px solid rgba(255,255,255,.26)";
      }
    });
  })();
</script>
